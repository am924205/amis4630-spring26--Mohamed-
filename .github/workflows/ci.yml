name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  backend:
    name: Backend Build & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Restore
        run: dotnet restore api.Tests/BuckeyeMarketplaceApi.Tests.csproj

      - name: Build
        run: dotnet build api.Tests/BuckeyeMarketplaceApi.Tests.csproj --configuration Release --no-restore

      - name: Test
        run: dotnet test api.Tests/BuckeyeMarketplaceApi.Tests.csproj --configuration Release --no-build --verbosity normal

  frontend:
    name: Frontend Build & Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20.x"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install
        run: npm ci

      - name: Test
        env:
          CI: "true"
        run: npm test -- --watchAll=false

      - name: Build
        env:
          CI: "false"
        run: npm run build
