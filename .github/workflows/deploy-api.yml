name: Deploy API to Azure

on:
  push:
    branches: [main]
    paths:
      - "api/**"
      - "api.Tests/**"
      - ".github/workflows/deploy-api.yml"
  workflow_dispatch:

env:
  DOTNET_VERSION: "10.0.x"
  AZURE_WEBAPP_NAME: buckeye-api-mohamed560
  AZURE_WEBAPP_PACKAGE_PATH: ./api/output

jobs:
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore API
        run: dotnet restore api/BuckeyeMarketplaceApi.csproj

      - name: Restore tests
        run: dotnet restore api.Tests/BuckeyeMarketplaceApi.Tests.csproj

      - name: Build tests (also builds API via project reference)
        run: dotnet build api.Tests/BuckeyeMarketplaceApi.Tests.csproj --configuration Release --no-restore

      - name: Test
        run: dotnet test api.Tests/BuckeyeMarketplaceApi.Tests.csproj --configuration Release --no-build --verbosity normal

      - name: Publish API
        run: dotnet publish api/BuckeyeMarketplaceApi.csproj --configuration Release --output ${{ env.AZURE_WEBAPP_PACKAGE_PATH }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: api
          path: ${{ env.AZURE_WEBAPP_PACKAGE_PATH }}

  deploy:
    name: Deploy to Azure App Service
    runs-on: ubuntu-latest
    needs: build-and-test
    if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request' && vars.ENABLE_AZURE_DEPLOY == 'true'
    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: api
          path: ./output

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ env.AZURE_WEBAPP_NAME }}
          package: ./output
          publish-profile: ${{ secrets.AZURE_API_PUBLISH_PROFILE }}
